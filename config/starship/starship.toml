format = """
$directory\
$git_branch\
$git_status\
$fill\
$status\
$cmd_duration\
$jobs\
$python\
$golang\
$nodejs\
$ruby\
$lua\
$java\
$kotlin\
$rust\
$terraform\
$kubernetes\
$line_break\
$character"""

[fill]
symbol = " "

[directory]
truncation_length = 4
truncate_to_repo = false

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[status]
disabled = false
format = "[$symbol$status]($style) "

[cmd_duration]
min_time = 2_000
format = "[took $duration]($style) "

[jobs]
symbol = "✦"

[python]
format = "[$symbol$virtualenv]($style) "

[golang]
format = "[$symbol$version]($style) "

[nodejs]
format = "[$symbol$version]($style) "

[ruby]
format = "[$symbol$version]($style) "

[lua]
format = "[$symbol$version]($style) "

[java]
format = "[$symbol$version]($style) "

[kotlin]
format = "[$symbol$version]($style) "

[rust]
format = "[$symbol$version]($style) "

[terraform]
format = "[$symbol$workspace]($style) "

[kubernetes]
disabled = false
format = "[$symbol$context( \\($namespace\\))]($style) "
