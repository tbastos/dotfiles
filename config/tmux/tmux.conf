set -g mouse on
set -g default-terminal 'tmux-256color'
set -g terminal-overrides ',xterm-256color:RGB'

set -ga terminal-features ",*:RGB"
setenv -g COLORTERM "truecolor"
set -ga terminal-features ",*:hyperlinks"

set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top
setw -g mode-keys vi

set-option -g allow-rename off
set-option -g automatic-rename off

# Bindings (prefix: Ctrl+Space)
# ========

unbind C-b
set -g prefix C-space
bind C-space send-prefix
bind ^D detach
bind * list-clients
bind l refresh-client
bind ^L refresh-client

bind S choose-session
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"
bind K send-keys "clear"\; send-keys "Enter"

bind ^C new-window -c "$HOME"
bind ^A last-window
bind ^W list-windows

unbind %
bind s split-window -h
bind v split-window -v

# no delay for escape key press
set -sg escape-time 0

# vim style copy/paste
unbind p
bind p paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection

# vim style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# shift-arrow keys without prefix key to switch panes
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# shift-arrow keys without prefix key to switch panes
bind -n C-S-Left resize-pane -L
bind -n C-S-Right resize-pane -R
bind -n C-S-Up resize-pane -U
bind -n C-S-Down resize-pane -D

# Plugins
# =======

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @continuum-restore 'on'
run-shell 'case "$(uname)" in Darwin) tmux set -g @ram_medium_thresh 85; tmux set -g @ram_high_thresh 95;; *) tmux set -g @ram_medium_thresh 30; tmux set -g @ram_high_thresh 80;; esac'
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
set -g @resurrect-strategy-nvim 'session'

# ANSI color overrides (must be before catppuccin run)
set -g @thm_bg        "default"
set -g @thm_mantle    "#222436"
set -g @thm_crust     "black"
set -g @thm_surface_0 "colour235"
set -g @thm_surface_1 "colour236"
set -g @thm_surface_2 "brightblack"
set -g @thm_overlay_0 "brightblack"
set -g @thm_overlay_1 "brightblack"
set -g @thm_overlay_2 "brightblack"
set -g @thm_subtext_0 "brightblack"
set -g @thm_subtext_1 "white"
set -g @thm_text      "white"
set -g @thm_fg        "white"
set -g @thm_lavender  "brightwhite"
set -g @thm_rosewater "brightwhite"
set -g @thm_red       "red"
set -g @thm_flamingo  "red"
set -g @thm_maroon    "red"
set -g @thm_peach     "yellow"
set -g @thm_yellow    "yellow"
set -g @thm_green     "green"
set -g @thm_teal      "cyan"
set -g @thm_sky       "cyan"
set -g @thm_sapphire  "blue"
set -g @thm_blue      "blue"
set -g @thm_mauve     "brightmagenta"
set -g @thm_pink      "magenta"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_ram_icon "󰍛 "

# Clear stale values so catppuccin regenerates them fresh
set -Ug @catppuccin_window_current_left_separator
set -Ug @catppuccin_window_current_right_separator
set -Ug @catppuccin_status_cpu
set -Ug @catppuccin_status_ram
set -Ug @catppuccin_status_battery
set -Ug @catppuccin_status_application
set -Ug @catppuccin_status_session

# Run catppuccin first to build module templates
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Build status-right (must be after catppuccin, before TPM/tmux-cpu)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Initialize TPM (tmux-cpu/battery process status-right, replacing
# #{cpu_percentage} etc. with #(script) calls for live data).
run '~/.dotfiles/vendor/tpm/tpm'

